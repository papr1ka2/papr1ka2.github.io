about_content: | # this will include new lines to allow paragraphs
  Hi, I'm Gye Jin, a first year PhD student at Georgia Tech. I'm interested in software security and cryptography.
  I enjoy researching various approaches for finding software bugs.
  Currently I am digging into:
    - symbolic execution
    - program verification
    - side channels

  If you want to know more about me check out my [CV](/docs/gyejinlee_cv.pdf)

